<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Bankroll Manager Pro | Профессиональный учет МТТ результатов</title>
    <meta name="description" content="Профессиональный инструмент для управления покерным банкроллом. Учет депозитов, выводов и прибыли в реальном времени.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a', 950: '#020617',
                        },
                        poker: {
                            red: '#dc2626',
                            green: '#16a34a',
                            blue: '#2563eb',
                            purple: '#7c3aed',
                            gold: '#f59e0b'
                        },
                        cyber: {
                            neon: '#00f5ff',
                            pink: '#ff00ff',
                            purple: '#8b5cf6',
                            dark: '#0a0a0f'
                        },
                        poker_table: {
                            green: '#0d5c2e',
                            felt: '#1a7f47',
                            gold: '#ffd700',
                            red: '#dc2626'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                        'slide-down': 'slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                        'shimmer': 'shimmer 2s linear infinite',
                        'bounce-subtle': 'bounceSubtle 2s ease-in-out infinite',
                        'tilt': 'tilt 0.5s ease-in-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(99, 102, 241, 0.5), 0 0 10px rgba(99, 102, 241, 0.3)' },
                            '100%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.8), 0 0 30px rgba(99, 102, 241, 0.5)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        tilt: {
                            '0%, 100%': { transform: 'rotate(0deg)' },
                            '25%': { transform: 'rotate(-2deg)' },
                            '75%': { transform: 'rotate(2deg)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        }
        
        /* Glass Panel Premium */
        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow:

                inset 0 1px 0 rgba(255, 255, 255, 0.5);

            box-shadow:

                0 0 40px rgba(0, 245, 255, 0.05),

        }
        
        .theme-poker .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid rgba(255, 215, 0, 0.35);
            box-shadow: 
                0 8px 32px rgba(13, 92, 46, 0.35),
                0 0 40px rgba(255, 215, 0, 0.1),

            border: 1px solid rgba(59, 130, 246, 0.35);

                0 0 40px rgba(59, 130, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);

        /* Animated Background Premium */
        .animated-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #6366f1, #8b5cf6);
            background-size: 600% 600%;
            animation: gradient 20s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Stat Card Premium */
        .stat-card { 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover::before {
            left: 100%;
        }
        
        .stat-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.3),
                0 15px 30px rgba(0, 0, 0, 0.2),
                0 0 40px rgba(99, 102, 241, 0.2);
        }
        
        .dark .stat-card:hover {
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.6),
                0 15px 30px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(99, 102, 241, 0.3);
        }
        
        /* Loading Spinner Enhanced */
        .loading-spinner { 
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.5));
        }
        
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        
        /* Gradient Text Premium */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 33%, #d946ef 66%, #6366f1 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            font-weight: 800;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .theme-cyberpunk .gradient-text {
            background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 50%, #8b5cf6 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .theme-poker .gradient-text {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #dc2626 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .theme-blue .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 50%, #60a5fa 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Button Styles Premium */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }
        
        .btn-primary:hover::after {
            width: 400px;
            height: 400px;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 50px rgba(99, 102, 241, 0.5),
                0 5px 15px rgba(99, 102, 241, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .theme-cyberpunk .btn-primary {
            background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
        }
        
        .theme-cyberpunk .btn-primary:hover {
            box-shadow: 
                0 15px 50px rgba(0, 245, 255, 0.5),
                0 5px 15px rgba(0, 245, 255, 0.3);
        }
        
        .theme-poker .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
        }
        
        .theme-poker .btn-primary:hover {
            box-shadow: 
                0 15px 50px rgba(255, 215, 0, 0.5),
                0 5px 15px rgba(255, 215, 0, 0.3);
        }
        
        .theme-blue .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }
        
        .theme-blue .btn-primary:hover {
            box-shadow: 
                0 15px 50px rgba(59, 130, 246, 0.5),
                0 5px 15px rgba(59, 130, 246, 0.3);
        }
        
        /* Card Glow Effect Premium */
        .card-glow {
            position: relative;
        }
        
        .card-glow::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(45deg, #6366f1, #8b5cf6, #d946ef, #ec4899, #6366f1);
            background-size: 400% 400%;
            border-radius: inherit;
            z-index: -1;

            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            filter: blur(15px);
        }
        
        .card-glow:hover::before {
            opacity: 0.8;
        }
        
        .theme-cyberpunk .card-glow::before {
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #8b5cf6, #00f5ff);
        }
        
        .theme-poker .card-glow::before {
            background: linear-gradient(45deg, #ffd700, #ff8c00, #dc2626, #ffd700);
        }
        
        .theme-blue .card-glow::before {
            background: linear-gradient(45deg, #3b82f6, #1d4ed8, #60a5fa, #3b82f6);
        }
        
        /* Table Container Enhanced */

        .table-container::-webkit-scrollbar-track {

        }
        
        .dark .table-container::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
        }
        
        /* Input Focus Effects Premium */
        input:focus, select:focus, textarea:focus {
            outline: none;
            ring: 3px;
            ring-color: #6366f1;
            ring-opacity: 0.5;
            transform: scale(1.01);

        .action-bar {

        .dark .action-bar {

        .icon-float {

        }

        .neon-glow {

        .theme-cyberpunk .neon-glow {

            text-shadow:

        }
        
        .theme-blue .neon-glow {
            text-shadow: 
                0 0 10px rgba(59, 130, 246, 0.9),

                0 0 40px rgba(96, 165, 250, 0.3);
        }
        
        /* Particle Background Enhanced */
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(8px);
        }
        
        .theme-cyberpunk .particle {
            background: radial-gradient(circle, rgba(0, 245, 255, 0.4) 0%, transparent 70%);
        }
        
        .theme-poker .particle {
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
        }
        
        .theme-blue .particle {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4) 0%, transparent 70%);
        }
        
        /* Toast Notification Premium */
        .toast {
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1), slideOutRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) 2.6s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        @keyframes slideInRight {
            from { 
                transform: translateX(100%) scale(0.9);
                opacity: 0;
            }
            to { 
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        @keyframes slideOutRight {
            from { 
                transform: translateX(0) scale(1);
                opacity: 1;
            }
            to { 
                transform: translateX(100%) scale(0.9);
                opacity: 0;
            }
        }
        
        /* Modal Backdrop Enhanced */
        .modal-backdrop {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.7);
        }
        
        /* Progress Bar Animation Premium */
        .progress-bar {
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #d946ef, #ec4899);
            background-size: 300% 100%;
            animation: shimmer 3s ease-in-out infinite;
            border-radius: 12px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            50% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Chip Design Premium */
        .chip {
            position: relative;
            overflow: hidden;
        }
        
        .chip::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
            background-size: 300% 300%;
            animation: chipShine 4s ease infinite;
        }
        
        @keyframes chipShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Sidebar Styles */
        .sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Dropdown Animation Enhanced */
        .dropdown-enter {
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Accordion Transition */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        
        .accordion-content.open {
            max-height: 1000px;
            opacity: 1;
        }
        
        /* Theme Selector Enhanced */
        .theme-option {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .theme-option:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .theme-option.active {
            ring: 3px;
            ring-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .mobile-menu {
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .mobile-menu.open {
            transform: translateX(0);
        }
        
        /* Hover Card Effect */
        .hover-lift {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.15),
                0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .dark .hover-lift:hover {
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        /* Shine Effect */
        .shine-effect {
            position: relative;
            overflow: hidden;
        }
        
        .shine-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s;
        }
        
        .shine-effect:hover::after {
            left: 100%;
        }
        
        /* Pulse Ring */
        .pulse-ring {
            position: relative;
        }
        
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }
        
        /* Gradient Border */
        .gradient-border {
            position: relative;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef) border-box;
            border: 2px solid transparent;
        }
        
        .dark .gradient-border {
            background: linear-gradient(#1e293b, #1e293b) padding-box,
                        linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef) border-box;
        }
        
        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.4) 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.5s, opacity 0.8s;
        }
        
        .ripple:active::after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }
    </style>
